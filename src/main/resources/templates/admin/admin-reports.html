<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Reports - CoffeeConnect Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>
    <div th:replace="~{fragments/admin-sidebar :: sidebar}"></div>
    <div class="admin-content">
        <div class="container-fluid p-4">
            <h4 class="mb-4">🚨 Reports Center</h4>
            <div class="row">
                <div th:each="r : ${reports}" class="col-md-6 mb-3">
                    <div class="card shadow-sm">
                        <div class="card-body">
                            <div class="d-flex justify-content-between">
                                <h6>Report #<span th:text="${r.id}"></span></h6>
                                <span class="badge" th:classappend="${r.status == 'PENDING'} ? 'bg-warning' : 'bg-success'" th:text="${r.status}"></span>
                            </div>
                            <hr>
                            <p><strong>Reporter:</strong> <span th:text="${r.reporter.fullName}"></span></p>
                            <p><strong>Reported User:</strong> <span th:text="${r.reportedUser.fullName}"></span></p>
                            <p><strong>Reason:</strong> <span th:text="${r.reason}"></span></p>
                            <p><strong>Details:</strong> <span th:text="${r.details}"></span></p>
                            <p class="text-muted small" th:text="${r.createdAt}"></p>
                            <div th:if="${r.status == 'PENDING'}" class="mt-2">
                                <form th:action="@{/admin/reports/{id}/dismiss(id=${r.id})}" method="post" style="display:inline">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                    <button class="btn btn-sm btn-outline-secondary">Dismiss</button>
                                </form>
                                <button class="btn btn-sm btn-outline-warning" data-bs-toggle="modal" th:attr="data-bs-target='#warnModal' + ${r.id}">Warn</button>
                                <button class="btn btn-sm btn-outline-danger" data-bs-toggle="modal" th:attr="data-bs-target='#actionModal' + ${r.id}">Suspend/Ban</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div th:each="r : ${reports}" class="modal fade" th:attr="id='warnModal' + ${r.id}" tabindex="-1">
                <div class="modal-dialog"><div class="modal-content">
                    <form th:action="@{/admin/reports/{id}/warn(id=${r.id})}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <div class="modal-header"><h5>Warn User</h5></div>
                        <div class="modal-body">
                            <textarea name="adminNotes" class="form-control" rows="3" placeholder="Warning message..." required></textarea>
                        </div>
                        <div class="modal-footer">
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                            <button type="submit" class="btn btn-warning">Send Warning</button>
                        </div>
                    </form>
                </div></div>
            </div>
            <div th:each="r : ${reports}" class="modal fade" th:attr="id='actionModal' + ${r.id}" tabindex="-1">
                <div class="modal-dialog"><div class="modal-content">
                    <div class="modal-header"><h5>Take Action</h5></div>
                    <div class="modal-body">
                        <form th:action="@{/admin/reports/{id}/suspend(id=${r.id})}" method="post" class="mb-2">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <input type="text" name="adminNotes" class="form-control mb-2" placeholder="Reason for suspension" required>
                            <button class="btn btn-danger w-100">Suspend User</button>
                        </form>
                        <form th:action="@{/admin/reports/{id}/ban(id=${r.id})}" method="post">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <input type="text" name="adminNotes" class="form-control mb-2" placeholder="Reason for permanent ban" required>
                            <button class="btn btn-dark w-100">Permanently Ban User</button>
                        </form>
                    </div>
                </div></div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
