<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Admin Dashboard - CoffeeConnect</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>
    <div th:replace="~{fragments/admin-sidebar :: sidebar}"></div>
    <div class="admin-content">
        <div class="container-fluid p-4">
            <h4 class="mb-4">📊 Admin Dashboard</h4>
            <div class="row">
                <div class="col-md-3 mb-3">
                    <div class="card bg-primary text-white h-100">
                        <div class="card-body text-center">
                            <h3 th:text="${stats.totalUsers}">0</h3>
                            <h6>Total Users</h6>
                        </div>
                    </div>
                </div>
                <div class="col-md-3 mb-3">
                    <div class="card bg-success text-white h-100">
                        <div class="card-body text-center">
                            <h3 th:text="${stats.verifiedUsers}">0</h3>
                            <h6>Verified Users</h6>
                        </div>
                    </div>
                </div>
                <div class="col-md-3 mb-3">
                    <div class="card bg-warning text-white h-100">
                        <div class="card-body text-center">
                            <h3 th:text="${stats.pendingVerifications}">0</h3>
                            <h6>Pending Verifications</h6>
                        </div>
                    </div>
                </div>
                <div class="col-md-3 mb-3">
                    <div class="card bg-danger text-white h-100">
                        <div class="card-body text-center">
                            <h3 th:text="${stats.suspendedUsers}">0</h3>
                            <h6>Suspended Users</h6>
                        </div>
                    </div>
                </div>
            </div>
            <div class="row">
                <div class="col-md-3 mb-3">
                    <div class="card bg-info text-white h-100">
                        <div class="card-body text-center">
                            <h3 th:text="${stats.activeUsers}">0</h3>
                            <h6>Active Users</h6>
                        </div>
                    </div>
                </div>
                <div class="col-md-3 mb-3">
                    <div class="card bg-secondary text-white h-100">
                        <div class="card-body text-center">
                            <h3 th:text="${stats.totalRequests}">0</h3>
                            <h6>Total Requests</h6>
                        </div>
                    </div>
                </div>
                <div class="col-md-3 mb-3">
                    <div class="card bg-primary text-white h-100">
                        <div class="card-body text-center">
                            <h3 th:text="${stats.totalConnections}">0</h3>
                            <h6>Total Connections</h6>
                        </div>
                    </div>
                </div>
                <div class="col-md-3 mb-3">
                    <div class="card bg-success text-white h-100">
                        <div class="card-body text-center">
                            <h3 th:text="${stats.totalMessages}">0</h3>
                            <h6>Total Messages</h6>
                        </div>
                    </div>
                </div>
            </div>
            <div class="row">
                <div class="col-md-4 mb-3">
                    <div class="card bg-danger text-white h-100">
                        <div class="card-body text-center">
                            <h3 th:text="${stats.totalReports}">0</h3>
                            <h6>Total Reports</h6>
                        </div>
                    </div>
                </div>
                <div class="col-md-4 mb-3">
                    <div class="card bg-info text-white h-100">
                        <div class="card-body text-center">
                            <h3 th:text="${stats.totalOfficeLocations}">0</h3>
                            <h6>Offices</h6>
                        </div>
                    </div>
                </div>
                <div class="col-md-4 mb-3">
                    <div class="card bg-warning text-white h-100">
                        <div class="card-body text-center">
                            <h3 th:text="${stats.totalCompanies}">0</h3>
                            <h6>Companies</h6>
                        </div>
                    </div>
                </div>
            </div>
            <div class="row mt-4">
                <div class="col-md-6 mb-4">
                    <div class="card shadow-sm">
                        <div class="card-header"><h6 class="mb-0">Registrations & Connections (Last 6 Months)</h6></div>
                        <div class="card-body">
                            <canvas id="userChart" height="200"></canvas>
                        </div>
                    </div>
                </div>
                <div class="col-md-6 mb-4">
                    <div class="card shadow-sm">
                        <div class="card-header"><h6 class="mb-0">Coffee Requests & Activity</h6></div>
                        <div class="card-body">
                            <canvas id="requestChart" height="200"></canvas>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        new Chart(document.getElementById('userChart'), {
            type: 'line',
            data: {
                labels: ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun'],
                datasets: [
                    { label: 'Registrations', data: [12, 19, 15, 22, 18, 25], borderColor: '#0d6efd', tension: 0.3 },
                    { label: 'Connections', data: [5, 8, 10, 14, 12, 18], borderColor: '#198754', tension: 0.3 }
                ]
            }
        });
        new Chart(document.getElementById('requestChart'), {
            type: 'bar',
            data: {
                labels: ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun'],
                datasets: [
                    { label: 'Requests Sent', data: [8, 12, 10, 15, 14, 20], backgroundColor: '#ffc107' },
                    { label: 'Accepted', data: [4, 7, 6, 10, 8, 14], backgroundColor: '#198754' }
                ]
            }
        });
    </script>
</body>
</html>
