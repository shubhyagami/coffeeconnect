<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Discover - CoffeeConnect</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div th:replace="~{fragments/navbar :: navbar}"></div>
    <div class="container mt-4">
        <div class="card" style="box-shadow:6px 6px 0px var(--border);">
            <div class="card-body">
                <h5 style="font-family:var(--font-heading);text-transform:uppercase;border-bottom:3px solid var(--border);padding-bottom:8px;">🔍 DISCOVER COLLEAGUES</h5>
                <form th:action="@{/discover}" method="get" class="row g-2 mt-2">
                    <div class="col-md-3">
                        <input type="text" name="search" class="form-control" placeholder="SEARCH..." th:value="${search}">
                    </div>
                    <div class="col-md-2">
                        <select name="company" class="form-select" onchange="this.form.submit()">
                            <option value="">ALL COMPANIES</option>
                            <option th:each="c : ${companies}" th:value="${c}" th:text="${c}" th:selected="${c == selectedCompany}"></option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <select name="dept" class="form-select" onchange="this.form.submit()">
                            <option value="">ALL DEPARTMENTS</option>
                            <option th:each="d : ${departments}" th:value="${d}" th:text="${d}" th:selected="${d == selectedDept}"></option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <select name="campus" class="form-select" onchange="this.form.submit()">
                            <option value="">ALL CAMPUSES</option>
                            <option th:each="c : ${campuses}" th:value="${c}" th:text="${c}" th:selected="${c == selectedCampus}"></option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <select name="city" class="form-select" onchange="this.form.submit()">
                            <option value="">ALL CITIES</option>
                            <option th:each="c : ${cities}" th:value="${c}" th:text="${c}" th:selected="${c == selectedCity}"></option>
                        </select>
                    </div>
                    <div class="col-md-1">
                        <button type="submit" class="btn btn-primary w-100" style="font-size:0.7rem;">GO</button>
                    </div>
                </form>
            </div>
        </div>
        <div class="row mt-3">
            <div th:each="user : ${users}" class="col-md-4 mb-4">
                <div class="card h-100" style="box-shadow:5px 5px 0px var(--border);">
                    <div class="card-body text-center">
                        <img th:src="${user.profilePictureBase64} ?: (${user.profilePictureUrl} ?: 'https://ui-avatars.com/api/?name=' + ${user.firstName} + '+' + ${user.lastName} + '&background=random&font-size=0.33')"
                             style="width:80px;height:80px;border:3px solid var(--border);margin-bottom:12px;">
                        <h5 style="font-family:var(--font-heading);text-transform:uppercase;font-size:0.9rem;" th:text="${user.fullName}"></h5>
                        <p style="font-family:var(--font);font-size:0.8rem;color:var(--text-muted);margin-bottom:4px;" th:text="${user.designation}"></p>
                        <p style="font-family:var(--font);font-size:0.8rem;color:var(--text-muted);margin-bottom:4px;" th:text="${user.companyName}"></p>
                        <p style="font-family:var(--font);font-size:0.7rem;color:var(--text-muted);" th:text="${user.department} + ' · ' + ${user.city}"></p>
                        <div class="d-flex justify-content-center gap-2">
                            <a th:href="@{/profile/{id}(id=${user.id})}" class="btn btn-outline-primary btn-sm">VIEW</a>
                            <form th:action="@{/coffee-requests/send}" method="post" style="display:inline;">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                <input type="hidden" name="receiverId" th:value="${user.id}">
                                <button type="submit" class="btn btn-primary btn-sm" style="font-size:0.65rem;">ASK FOR COFFEE</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <nav th:if="${totalPages > 1}" class="mt-4">
            <ul class="pagination justify-content-center">
                <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                    <a class="page-link" th:href="@{/discover(page=${currentPage - 1}, search=${search}, company=${selectedCompany}, campus=${selectedCampus}, dept=${selectedDept}, city=${selectedCity})}">PREV</a>
                </li>
                <li class="page-item" th:each="i : ${#numbers.sequence(0, totalPages - 1)}" th:classappend="${i == currentPage} ? 'active'">
                    <a class="page-link" th:href="@{/discover(page=${i}, search=${search}, company=${selectedCompany}, campus=${selectedCampus}, dept=${selectedDept}, city=${selectedCity})}" th:text="${i + 1}"></a>
                </li>
                <li class="page-item" th:classappend="${currentPage >= totalPages - 1} ? 'disabled'">
                    <a class="page-link" th:href="@{/discover(page=${currentPage + 1}, search=${search}, company=${selectedCompany}, campus=${selectedCampus}, dept=${selectedDept}, city=${selectedCity})}">NEXT</a>
                </li>
            </ul>
        </nav>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
