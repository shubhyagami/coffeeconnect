spring:
  datasource:
    url: jdbc:h2:file:./data/coffeeconnect
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: false
    properties:
      hibernate:
        format_sql: false
    hibernate:
      ddl-auto: update
  thymeleaf:
    cache: true

server:
  port: ${PORT:8080}

app:
  frontend-url: https://coffeeconnect.onrender.com
