<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Profile - CoffeeConnect</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div th:replace="~{fragments/navbar :: navbar}"></div>
    <div class="container mt-4">
        <div class="row">
            <div class="col-md-4">
                <div class="card" style="box-shadow:6px 6px 0px var(--border);">
                    <div class="card-body text-center">
                        <img th:src="${profile.profilePictureBase64} ?: (${profile.profilePictureUrl} ?: 'https://ui-avatars.com/api/?name=' + ${profile.firstName} + '+' + ${profile.lastName} + '&background=random&font-size=0.33')"
                             style="width:150px;height:150px;border:4px solid var(--border);margin-bottom:16px;">
                        <h3 style="font-family:var(--font-heading);text-transform:uppercase;font-size:1.2rem;" th:text="${profile.firstName} + ' ' + ${profile.lastName}"></h3>
                        <p style="font-family:var(--font);font-size:0.85rem;color:var(--text-muted);"><strong th:text="${profile.designation}"></strong></p>
                        <p style="font-family:var(--font);font-size:0.85rem;color:var(--text-muted);" th:text="${profile.companyName}"></p>
                        <p><span class="badge" style="background:var(--accent3);border-color:var(--border);" th:if="${profile.verificationStatus == 'VERIFIED'}">VERIFIED</span>
                        <span class="badge" style="background:var(--accent2);border-color:var(--border);color:var(--text);" th:if="${profile.verificationStatus == 'PENDING'}">PENDING</span>
                        <span class="badge" style="background:var(--accent);border-color:var(--border);" th:if="${profile.verificationStatus == 'REJECTED'}">REJECTED</span></p>
                        <hr>
                        <p style="font-family:var(--font);font-size:0.8rem;"><strong>DEPARTMENT:</strong> <span th:text="${profile.department}"></span></p>
                        <p style="font-family:var(--font);font-size:0.8rem;"><strong>CITY:</strong> <span th:text="${profile.city}"></span></p>
                        <p style="font-family:var(--font);font-size:0.8rem;"><strong>CAMPUS:</strong> <span th:text="${profile.officeCampus}"></span></p>
                        <p style="font-family:var(--font);font-size:0.8rem;"><strong>CONNECTIONS:</strong> <span th:text="${connectionsCount} ?: ${profile.connectionsCount}"></span></p>
                        <hr>
                        <div th:if="${isOwnProfile}">
                            <a th:href="@{/profile/edit}" class="btn btn-primary w-100 mb-2">EDIT PROFILE</a>
                        </div>
                        <div th:if="${!isOwnProfile && isConnected}">
                            <form th:action="@{/messages/start}" method="post" class="d-inline w-100 mb-2">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                <input type="hidden" name="userId" th:value="${profile.id}">
                                <button type="submit" class="btn btn-primary w-100 mb-2">SEND MESSAGE</button>
                            </form>
                            <form th:action="@{/video-call/start}" method="post" class="d-inline w-100 mb-2">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                <input type="hidden" name="userId" th:value="${profile.id}">
                                <button type="submit" class="btn btn-success w-100 mb-2">VIDEO CALL</button>
                            </form>
                        </div>
                        <div th:if="${!isOwnProfile && !isConnected && !hasPendingRequest}">
                            <form th:action="@{/coffee-requests/send}" method="post">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                <input type="hidden" name="receiverId" th:value="${profile.id}">
                                <button type="submit" class="btn btn-primary w-100" style="font-size:0.9rem;padding:12px;">ASK FOR COFFEE</button>
                            </form>
                        </div>
                        <div th:if="${!isOwnProfile && hasPendingRequest}">
                            <button class="btn btn-secondary w-100" style="font-family:var(--font);" disabled>REQUEST PENDING</button>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-8">
                <div class="card" style="box-shadow:6px 6px 0px var(--border);">
                    <div class="card-body">
                        <h5 style="font-family:var(--font-heading);text-transform:uppercase;border-bottom:3px solid var(--border);padding-bottom:8px;">ABOUT</h5>
                        <p style="font-family:var(--font);" th:text="${profile.bio} ?: 'NO BIO ADDED YET'"></p>
                    </div>
                </div>
                <div class="card" style="box-shadow:6px 6px 0px var(--border);">
                    <div class="card-body">
                        <h5 style="font-family:var(--font-heading);text-transform:uppercase;border-bottom:3px solid var(--border);padding-bottom:8px;">INTERESTS</h5>
                        <p style="font-family:var(--font);" th:text="${profile.interests} ?: 'NO INTERESTS ADDED YET'"></p>
                    </div>
                </div>
                <div class="card" style="box-shadow:6px 6px 0px var(--border);">
                    <div class="card-body">
                        <h5 style="font-family:var(--font-heading);text-transform:uppercase;border-bottom:3px solid var(--border);padding-bottom:8px;">DETAILS</h5>
                        <div class="row" style="font-family:var(--font);font-size:0.8rem;">
                            <div class="col-md-6 mb-2"><strong>EMPLOYEE ID:</strong> <span th:text="${profile.employeeId}"></span></div>
                            <div class="col-md-6 mb-2"><strong>EMAIL:</strong> <span th:text="${profile.email}"></span></div>
                            <div class="col-md-6 mb-2"><strong>GENDER:</strong> <span th:text="${profile.gender}"></span></div>
                            <div class="col-md-6 mb-2"><strong>DOB:</strong> <span th:text="${profile.dateOfBirth}"></span></div>
                            <div class="col-md-6 mb-2"><strong>DEPARTMENT:</strong> <span th:text="${profile.department}"></span></div>
                            <div class="col-md-6 mb-2"><strong>DESIGNATION:</strong> <span th:text="${profile.designation}"></span></div>
                            <div class="col-md-6 mb-2"><strong>CITY:</strong> <span th:text="${profile.city}"></span></div>
                            <div class="col-md-6 mb-2"><strong>CAMPUS:</strong> <span th:text="${profile.officeCampus}"></span></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
