<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Offices - CoffeeConnect Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>
    <div th:replace="~{fragments/admin-sidebar :: sidebar}"></div>
    <div class="admin-content">
        <div class="container-fluid p-4">
            <h4 class="mb-4">📍 Office Management</h4>
            <button class="btn btn-primary mb-3" data-bs-toggle="modal" data-bs-target="#addOfficeModal">+ Add Office</button>
            <div class="card shadow-sm">
                <div class="card-body p-0">
                    <table class="table table-hover mb-0">
                        <thead class="table-dark">
                            <tr><th>Company</th><th>City</th><th>Campus</th><th>Address</th><th>Lat/Lng</th><th>Actions</th></tr>
                        </thead>
                        <tbody>
                            <tr th:each="o : ${offices}">
                                <td th:text="${o.companyName}"></td>
                                <td th:text="${o.city}"></td>
                                <td th:text="${o.campusName}"></td>
                                <td th:text="${o.address}"></td>
                                <td th:text="${o.latitude} + ', ' + ${o.longitude}"></td>
                                <td>
                                    <button class="btn btn-sm btn-outline-primary" data-bs-toggle="modal" th:attr="data-bs-target='#editModal' + ${o.id}">Edit</button>
                                    <form th:action="@{/admin/offices/{id}/delete(id=${o.id})}" method="post" style="display:inline" onsubmit="return confirm('Delete?')">
                                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                        <button class="btn btn-sm btn-outline-danger">Delete</button>
                                    </form>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
    <div class="modal fade" id="addOfficeModal" tabindex="-1">
        <div class="modal-dialog"><div class="modal-content">
            <form th:action="@{/admin/offices}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <div class="modal-header"><h5>Add Office</h5></div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label>Company</label>
                        <select name="companyName" class="form-select" required>
                            <option value="">Select</option>
                            <option th:each="c : ${companies}" th:value="${c.companyName}" th:text="${c.companyName}"></option>
                        </select>
                    </div>
                    <div class="mb-3"><label>City</label><input type="text" name="city" class="form-control" required></div>
                    <div class="mb-3"><label>Campus Name</label><input type="text" name="campusName" class="form-control" required></div>
                    <div class="mb-3"><label>Address</label><textarea name="address" class="form-control" rows="2"></textarea></div>
                    <div class="row">
                        <div class="col-md-6 mb-3"><label>Latitude</label><input type="number" step="any" name="latitude" class="form-control"></div>
                        <div class="col-md-6 mb-3"><label>Longitude</label><input type="number" step="any" name="longitude" class="form-control"></div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-primary">Add</button>
                </div>
            </form>
        </div></div>
    </div>
    <div th:each="o : ${offices}" class="modal fade" th:attr="id='editModal' + ${o.id}" tabindex="-1">
        <div class="modal-dialog"><div class="modal-content">
            <form th:action="@{/admin/offices/{id}/update(id=${o.id})}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <div class="modal-header"><h5>Edit <span th:text="${o.campusName}"></span></h5></div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label>Company</label>
                        <select name="companyName" class="form-select" required>
                            <option th:each="c : ${companies}" th:value="${c.companyName}" th:text="${c.companyName}" th:selected="${c.companyName == o.companyName}"></option>
                        </select>
                    </div>
                    <div class="mb-3"><label>City</label><input type="text" name="city" class="form-control" th:value="${o.city}" required></div>
                    <div class="mb-3"><label>Campus Name</label><input type="text" name="campusName" class="form-control" th:value="${o.campusName}" required></div>
                    <div class="mb-3"><label>Address</label><textarea name="address" class="form-control" rows="2" th:text="${o.address}"></textarea></div>
                    <div class="row">
                        <div class="col-md-6 mb-3"><label>Latitude</label><input type="number" step="any" name="latitude" class="form-control" th:value="${o.latitude}"></div>
                        <div class="col-md-6 mb-3"><label>Longitude</label><input type="number" step="any" name="longitude" class="form-control" th:value="${o.longitude}"></div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save</button>
                </div>
            </form>
        </div></div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
