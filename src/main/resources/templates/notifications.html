<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Notifications - CoffeeConnect</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div th:replace="~{fragments/navbar :: navbar}"></div>
    <div class="container mt-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h4 style="font-family:var(--font-heading);text-transform:uppercase;border-bottom:4px solid var(--border);padding-bottom:8px;margin:0;">🔔 NOTIFICATIONS</h4>
            <form th:action="@{/notifications/read-all}" method="post" style="display:inline">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button class="btn btn-outline-primary btn-sm">MARK ALL READ</button>
            </form>
        </div>
        <div class="card" style="box-shadow:6px 6px 0px var(--border);">
            <div class="card-body p-0">
                <div th:if="${notifications.isEmpty()}" class="text-center py-5" style="font-family:var(--font);color:var(--text-muted);">NO NOTIFICATIONS</div>
                <div th:each="notif : ${notifications}" class="p-3 border-bottom" style="border-color:var(--border)!important;" th:classappend="${!notif.read} ? '' : ''" th:style="${!notif.read} ? 'background:var(--accent2);color:var(--text);border-left:4px solid var(--accent);' : ''">
                    <div class="d-flex align-items-start">
                        <div class="flex-grow-1">
                            <strong style="font-family:var(--font-heading);text-transform:uppercase;font-size:0.85rem;" th:text="${notif.title}"></strong>
                            <p class="mb-1" style="font-family:var(--font);font-size:0.8rem;" th:text="${notif.message}"></p>
                            <small style="font-family:var(--font);color:var(--text-muted);font-size:0.65rem;" th:text="${notif.createdAt}"></small>
                        </div>
                        <div class="ms-3 d-flex gap-1">
                            <form th:if="${!notif.read}" th:action="@{/notifications/{id}/read(id=${notif.id})}" method="post" style="display:inline">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                <button type="submit" class="btn btn-sm" style="background:var(--accent4);color:#fff;border:2px solid var(--border);font-size:0.65rem;">✓</button>
                            </form>
                            <a th:if="${notif.targetUrl}" th:href="${notif.targetUrl}" class="btn btn-sm btn-outline-primary" style="font-size:0.65rem;">VIEW</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
