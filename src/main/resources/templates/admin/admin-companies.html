<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Companies - CoffeeConnect Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>
    <div th:replace="~{fragments/admin-sidebar :: sidebar}"></div>
    <div class="admin-content">
        <div class="container-fluid p-4">
            <h4 class="mb-4">🏢 Company Management</h4>
            <button class="btn btn-primary mb-3" data-bs-toggle="modal" data-bs-target="#addCompanyModal">+ Add Company</button>
            <div class="card shadow-sm">
                <div class="card-body p-0">
                    <table class="table table-hover mb-0">
                        <thead class="table-dark">
                            <tr><th>Name</th><th>Email Domain</th><th>Headquarters</th><th>Active</th><th>Actions</th></tr>
                        </thead>
                        <tbody>
                            <tr th:each="c : ${companies}">
                                <td th:text="${c.companyName}"></td>
                                <td th:text="${c.emailDomain}"></td>
                                <td th:text="${c.headquarters}"></td>
                                <td><span class="badge" th:classappend="${c.active} ? 'bg-success' : 'bg-danger'" th:text="${c.active} ? 'Active' : 'Disabled'"></span></td>
                                <td>
                                    <button class="btn btn-sm btn-outline-primary" data-bs-toggle="modal" th:attr="data-bs-target='#editModal' + ${c.id}">Edit</button>
                                    <form th:action="@{/admin/companies/{id}/toggle(id=${c.id})}" method="post" style="display:inline">
                                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                        <button class="btn btn-sm btn-outline-warning" th:text="${c.active} ? 'Disable' : 'Enable'"></button>
                                    </form>
                                    <form th:action="@{/admin/companies/{id}/delete(id=${c.id})}" method="post" style="display:inline" onsubmit="return confirm('Delete?')">
                                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                        <button class="btn btn-sm btn-outline-danger">Delete</button>
                                    </form>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
    <div class="modal fade" id="addCompanyModal" tabindex="-1">
        <div class="modal-dialog"><div class="modal-content">
            <form th:action="@{/admin/companies}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <div class="modal-header"><h5>Add Company</h5></div>
                <div class="modal-body">
                    <div class="mb-3"><label>Company Name</label><input type="text" name="companyName" class="form-control" required></div>
                    <div class="mb-3"><label>Email Domain</label><input type="text" name="emailDomain" class="form-control" placeholder="@company.com" required></div>
                    <div class="mb-3"><label>Headquarters</label><input type="text" name="headquarters" class="form-control"></div>
                    <div class="mb-3"><label>Logo URL</label><input type="url" name="logoUrl" class="form-control"></div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-primary">Add</button>
                </div>
            </form>
        </div></div>
    </div>
    <div th:each="c : ${companies}" class="modal fade" th:attr="id='editModal' + ${c.id}" tabindex="-1">
        <div class="modal-dialog"><div class="modal-content">
            <form th:action="@{/admin/companies/{id}/update(id=${c.id})}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <div class="modal-header"><h5>Edit <span th:text="${c.companyName}"></span></h5></div>
                <div class="modal-body">
                    <div class="mb-3"><label>Company Name</label><input type="text" name="companyName" class="form-control" th:value="${c.companyName}" required></div>
                    <div class="mb-3"><label>Email Domain</label><input type="text" name="emailDomain" class="form-control" th:value="${c.emailDomain}" required></div>
                    <div class="mb-3"><label>Headquarters</label><input type="text" name="headquarters" class="form-control" th:value="${c.headquarters}"></div>
                    <div class="mb-3"><label>Logo URL</label><input type="url" name="logoUrl" class="form-control" th:value="${c.logoUrl}"></div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save</button>
                </div>
            </form>
        </div></div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
