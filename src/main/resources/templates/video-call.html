<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Video Call - CoffeeConnect</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div th:replace="~{fragments/navbar :: navbar}"></div>
    <div class="container mt-4">
        <div class="card" style="border:4px solid var(--border);box-shadow:8px 8px 0px var(--border);">
            <div class="card-header d-flex justify-content-between align-items-center" style="background:var(--primary);color:#fff;">
                <h5 class="mb-0" style="font-family:var(--font-heading);text-transform:uppercase;">📹 VIDEO CALL — ROOM: <span th:text="${roomId}"></span></h5>
                <div>
                    <span class="badge" id="callStatus" style="background:var(--accent3);border-color:var(--border);margin-right:8px;">CONNECTING...</span>
                    <button class="btn btn-danger btn-sm" id="endCallBtn" onclick="endCall()" style="font-size:0.7rem;">END CALL</button>
                </div>
            </div>
            <div class="card-body" style="background:#1a1a1a;">
                <div class="row">
                    <div class="col-md-8 mb-3">
                        <div style="background:#000;border:3px solid var(--accent2);height:400px;position:relative;display:flex;align-items:center;justify-content:center;">
                            <video id="remoteVideo" autoplay playsinline class="w-100 h-100" style="object-fit:cover;"></video>
                            <div id="remoteWaiting" class="text-center position-absolute" style="color:#fff;font-family:var(--font-heading);text-transform:uppercase;letter-spacing:2px;">
                                <h3>⏳ WAITING...</h3>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-4 mb-3">
                        <div style="background:#000;border:3px solid var(--accent);height:200px;position:relative;display:flex;align-items:center;justify-content:center;">
                            <video id="localVideo" autoplay playsinline muted class="w-100 h-100" style="object-fit:cover;"></video>
                            <div class="position-absolute" style="bottom:8px;left:50%;transform:translateX(-50%);">
                                <small style="color:#fff;font-family:var(--font);background:rgba(0,0,0,0.7);padding:2px 8px;border:1px solid #fff;" th:text="${userName}"></small>
                            </div>
                        </div>
                        <div class="mt-3 d-flex justify-content-center gap-2 flex-wrap">
                            <button class="btn btn-outline-secondary btn-sm" id="muteBtn" onclick="toggleMute()" style="background:#fff;">🔇 MUTE</button>
                            <button class="btn btn-outline-secondary btn-sm" id="cameraBtn" onclick="toggleCamera()" style="background:#fff;">📷 CAM OFF</button>
                            <button class="btn btn-outline-secondary btn-sm" onclick="toggleFullscreen()" style="background:#fff;">⛶ FULL</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <input type="hidden" id="roomId" th:value="${roomId}">
    <input type="hidden" id="userId" th:value="${userId}">
    <input type="hidden" id="userName" th:value="${userName}">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/video-call.js}"></script>
</body>
</html>
