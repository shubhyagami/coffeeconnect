<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Connections - CoffeeConnect</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div th:replace="~{fragments/navbar :: navbar}"></div>
    <div class="container mt-4">
        <h4 style="font-family:var(--font-heading);text-transform:uppercase;border-bottom:4px solid var(--border);padding-bottom:8px;margin-bottom:20px;">🤝 MY NETWORK <span class="badge" style="background:var(--accent4);border-color:var(--border);font-size:0.7rem;" th:text="${connectionCount}"></span></h4>
        <div class="row">
            <div th:each="conn : ${connections}" class="col-md-4 mb-4">
                <div th:if="${conn.userOne.id != null}" class="card h-100" style="box-shadow:5px 5px 0px var(--border);">
                    <div class="card-body text-center">
                        <img th:src="${conn.userOne.id == currentUserId ? (conn.userTwo.profilePictureBase64 ?: (conn.userTwo.profilePictureUrl ?: 'https://ui-avatars.com/api/?name=' + conn.userTwo.firstName + '+' + conn.userTwo.lastName + '&background=random&font-size=0.33')) : (conn.userOne.profilePictureBase64 ?: (conn.userOne.profilePictureUrl ?: 'https://ui-avatars.com/api/?name=' + conn.userOne.firstName + '+' + conn.userOne.lastName + '&background=random&font-size=0.33'))}"
                             style="width:80px;height:80px;border:3px solid var(--border);margin-bottom:12px;">
                        <h5 style="font-family:var(--font-heading);text-transform:uppercase;font-size:0.9rem;" th:text="${conn.userOne.id == currentUserId ? conn.userTwo.fullName : conn.userOne.fullName}"></h5>
                        <p class="mb-1" style="font-family:var(--font);font-size:0.8rem;color:var(--text-muted);" th:text="${conn.userOne.id == currentUserId ? conn.userTwo.designation : conn.userOne.designation}"></p>
                        <p class="small" style="font-family:var(--font);color:var(--text-muted);" th:text="${conn.userOne.id == currentUserId ? conn.userTwo.companyName : conn.userOne.companyName}"></p>
                        <p class="small" style="font-family:var(--font);color:var(--text-muted);">CONNECTED <span th:text="${conn.connectedAt}"></span></p>
                        <div class="d-flex justify-content-center gap-2 flex-wrap">
                            <form th:action="@{/messages/start}" method="post" style="display:inline">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                <input type="hidden" name="userId" th:value="${conn.userOne.id == currentUserId ? conn.userTwo.id : conn.userOne.id}">
                                <button type="submit" class="btn btn-primary btn-sm">MESSAGE</button>
                            </form>
                            <a th:href="@{/profile/{id}(id=${conn.userOne.id == currentUserId ? conn.userTwo.id : conn.userOne.id})}" class="btn btn-outline-primary btn-sm">PROFILE</a>
                            <form th:action="@{/connections/{id}/remove(id=${conn.id})}" method="post" style="display:inline" onsubmit="return confirm('Remove this connection?')">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                <button class="btn btn-outline-danger btn-sm">REMOVE</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <nav th:if="${totalPages > 1}" class="mt-4">
            <ul class="pagination justify-content-center">
                <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                    <a class="page-link" th:href="@{/connections(page=${currentPage - 1})}">PREV</a>
                </li>
                <li th:each="i : ${#numbers.sequence(0, totalPages - 1)}" class="page-item" th:classappend="${i == currentPage} ? 'active'">
                    <a class="page-link" th:href="@{/connections(page=${i})}" th:text="${i + 1}"></a>
                </li>
                <li class="page-item" th:classappend="${currentPage >= totalPages - 1} ? 'disabled'">
                    <a class="page-link" th:href="@{/connections(page=${currentPage + 1})}">NEXT</a>
                </li>
            </ul>
        </nav>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
