<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Coffee Requests - CoffeeConnect Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>
    <div th:replace="~{fragments/admin-sidebar :: sidebar}"></div>
    <div class="admin-content">
        <div class="container-fluid p-4">
            <h4 class="mb-4">☕ Coffee Request Management</h4>
            <div class="card shadow-sm mb-3">
                <div class="card-body">
                    <form th:action="@{/admin/requests}" method="get" class="row g-2">
                        <div class="col-md-4"><input type="text" name="search" class="form-control" placeholder="Search..." th:value="${search}"></div>
                        <div class="col-md-3">
                            <select name="status" class="form-select">
                                <option value="">All Status</option>
                                <option value="PENDING" th:selected="${selectedStatus == 'PENDING'}">PENDING</option>
                                <option value="ACCEPTED" th:selected="${selectedStatus == 'ACCEPTED'}">ACCEPTED</option>
                                <option value="DECLINED" th:selected="${selectedStatus == 'DECLINED'}">DECLINED</option>
                                <option value="CANCELLED" th:selected="${selectedStatus == 'CANCELLED'}">CANCELLED</option>
                            </select>
                        </div>
                        <div class="col-md-1"><button type="submit" class="btn btn-primary">Filter</button></div>
                    </form>
                </div>
            </div>
            <div class="card shadow-sm">
                <div class="card-body p-0">
                    <table class="table table-hover mb-0">
                        <thead class="table-dark">
                            <tr><th>Sender</th><th>Receiver</th><th>Message</th><th>Status</th><th>Date</th><th>Actions</th></tr>
                        </thead>
                        <tbody>
                            <tr th:each="r : ${requests}">
                                <td th:text="${r.sender.fullName}"></td>
                                <td th:text="${r.receiver.fullName}"></td>
                                <td th:text="${r.message}"></td>
                                <td><span class="badge" th:classappend="${r.status.name() == 'PENDING' ? 'bg-warning' : r.status.name() == 'ACCEPTED' ? 'bg-success' : 'bg-secondary'}" th:text="${r.status.name()}"></span></td>
                                <td th:text="${r.createdAt}"></td>
                                <td>
                                    <form th:if="${r.status.name() == 'PENDING'}" th:action="@{/admin/requests/{id}/cancel(id=${r.id})}" method="post" onsubmit="return confirm('Cancel this request?')">
                                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                        <button class="btn btn-sm btn-outline-warning">Cancel</button>
                                    </form>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
