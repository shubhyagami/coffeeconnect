<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<div th:fragment="navbar" class="mb-0">
    <nav class="navbar-brutal navbar-expand-lg">
        <div class="container-fluid">
            <a class="navbar-brand" th:href="@{/dashboard}">☕ COFFEECONNECT</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" style="border:2px solid #fff;border-radius:0;padding:6px 10px;background:transparent;">
                <span style="color:#fff;font-size:1.2rem;">☰</span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" th:href="@{/dashboard}">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/discover}">Discover</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/coffee-requests}">☕ Requests</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/connections}">My Network</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/messages}">Messages</a></li>
                    <li class="nav-item"><a class="nav-link position-relative" th:href="@{/notifications}">
                        🔔 Notif
                        <span th:if="${unreadNotifications > 0}" class="position-absolute top-0 start-100 translate-middle badge" style="background:var(--accent);color:#fff;border:2px solid #fff;font-size:0.55rem;" th:text="${unreadNotifications}"></span>
                    </a></li>
                    <li sec:authorize="hasAnyAuthority('ROLE_ADMIN','ROLE_SUPER_ADMIN')" class="nav-item">
                        <a class="nav-link" style="background:var(--accent2);color:var(--text)!important;font-weight:bold;" th:href="@{/admin/dashboard}">⚡ ADMIN</a>
                    </li>
                </ul>
                <ul class="navbar-nav">
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown" style="border-right:none;">
                            <span sec:authentication="principal.fullName"></span>
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end">
                            <li><a class="dropdown-item" th:href="@{/profile}">👤 My Profile</a></li>
                            <li><a class="dropdown-item" th:href="@{/profile/edit}">✏️ Edit Profile</a></li>
                            <li><a class="dropdown-item" th:href="@{/profile/change-password}">🔑 Change Password</a></li>
                            <li><hr class="dropdown-divider" style="border-color:var(--border);border-width:2px;"></li>
                            <li><a class="dropdown-item" style="color:var(--accent) !important;" th:href="@{/logout}">🚪 Logout</a></li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
</div>
</body>
</html>
