<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login - CoffeeConnect</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body style="background:var(--primary);">
    <div class="container">
        <div class="row justify-content-center" style="min-height:100vh;align-items:center;">
            <div class="col-md-5">
                <div class="text-center mb-4">
                    <h1 style="font-family:var(--font-heading);color:#fff;font-size:2.5rem;text-transform:uppercase;letter-spacing:2px;border:4px solid var(--accent2);display:inline-block;padding:12px 24px;background:var(--accent);">☕ CoffeeConnect</h1>
                    <p style="color:#fff;font-family:var(--font);margin-top:12px;">Sign in to your account</p>
                </div>
                <div class="card" style="border:4px solid var(--border);box-shadow:8px 8px 0px var(--border);">
                    <div class="card-body p-4">
                        <div th:if="${param.error}" class="alert alert-danger">INVALID EMAIL OR PASSWORD</div>
                        <div th:if="${param.logout}" class="alert alert-info">YOU HAVE BEEN LOGGED OUT</div>
                        <div th:if="${param.expired}" class="alert alert-warning">SESSION EXPIRED. PLEASE LOGIN AGAIN</div>
                        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
                        <form th:action="@{/login}" method="post">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <div class="mb-3">
                                <label class="form-label">COMPANY EMAIL</label>
                                <input type="email" name="username" class="form-control" required autofocus>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">PASSWORD</label>
                                <input type="password" name="password" class="form-control" required>
                            </div>
                            <div class="mb-3 form-check">
                                <input type="checkbox" name="remember-me" class="form-check-input" id="remember">
                                <label class="form-check-label" for="remember" style="font-family:var(--font);font-size:0.8rem;">REMEMBER ME</label>
                            </div>
                            <button type="submit" class="btn btn-primary w-100" style="font-size:0.9rem;padding:12px;">SIGN IN</button>
                        </form>
                        <div class="text-center mt-3">
                            <p class="mb-0" style="font-family:var(--font);font-size:0.8rem;">Don't have an account? <a th:href="@{/register}">REGISTER HERE</a></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
