services:
  - type: web
    name: coffeeconnect
    runtime: docker
    dockerfilePath: Dockerfile
    healthCheckPath: /
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: render
      - key: RENDER_DATABASE_URL
        fromDatabase:
          name: coffeeconnect-db
          property: connectionString
databases:
  - name: coffeeconnect-db
    plan: free
    databaseName: coffeeconnect
    user: coffeeconnect
