<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Audit Logs - CoffeeConnect Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>
    <div th:replace="~{fragments/admin-sidebar :: sidebar}"></div>
    <div class="admin-content">
        <div class="container-fluid p-4">
            <h4 class="mb-4">📋 Audit Logs</h4>
            <div class="card shadow-sm mb-3">
                <div class="card-body">
                    <form th:action="@{/admin/audit-logs}" method="get" class="row g-2">
                        <div class="col-md-4"><input type="text" name="search" class="form-control" placeholder="Search by admin, action, entity..." th:value="${search}"></div>
                        <div class="col-md-1"><button type="submit" class="btn btn-primary">Search</button></div>
                    </form>
                </div>
            </div>
            <div class="card shadow-sm">
                <div class="card-body p-0">
                    <table class="table table-hover mb-0">
                        <thead class="table-dark">
                            <tr><th>Timestamp</th><th>Admin</th><th>Action</th><th>Entity</th><th>Target ID</th><th>Details</th></tr>
                        </thead>
                        <tbody>
                            <tr th:each="log : ${logs}">
                                <td class="small" th:text="${log.timestamp}"></td>
                                <td th:text="${log.adminUsername}"></td>
                                <td><span class="badge bg-info" th:text="${log.actionType}"></span></td>
                                <td th:text="${log.targetEntity}"></td>
                                <td th:text="${log.targetId} ?: '-'"></td>
                                <td class="small text-muted" th:text="${log.details}"></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
