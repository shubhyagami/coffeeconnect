<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Dashboard - CoffeeConnect</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div th:replace="~{fragments/navbar :: navbar}"></div>
    <div class="container mt-4">
        <div class="row">
            <div class="col-md-4">
                <div class="card" style="box-shadow:6px 6px 0px var(--border);">
                    <div class="card-body text-center">
                        <img th:src="${profile.profilePictureBase64} ?: (${profile.profilePictureUrl} ?: 'https://ui-avatars.com/api/?name=' + ${profile.firstName} + '+' + ${profile.lastName} + '&background=random&font-size=0.33')"
                             style="width:120px;height:120px;border:4px solid var(--border);margin-bottom:12px;">
                        <h4 style="font-family:var(--font-heading);text-transform:uppercase;font-size:1.1rem;" th:text="${profile.firstName} + ' ' + ${profile.lastName}"></h4>
                        <p style="font-family:var(--font);font-size:0.8rem;color:var(--text-muted);margin-bottom:4px;" th:text="${profile.designation}"></p>
                        <p style="font-family:var(--font);font-size:0.8rem;color:var(--text-muted);margin-bottom:4px;" th:text="${profile.companyName}"></p>
                        <p><span class="badge" style="background:var(--accent3);border-color:var(--border);" th:if="${profile.verificationStatus == 'VERIFIED'}">VERIFIED</span>
                        <span class="badge" style="background:var(--accent2);border-color:var(--border);color:var(--text);" th:if="${profile.verificationStatus == 'PENDING'}">PENDING</span>
                        <span class="badge" style="background:var(--accent);border-color:var(--border);color:#fff;" th:if="${profile.verificationStatus == 'REJECTED'}">REJECTED</span></p>
                        <a th:href="@{/profile}" class="btn btn-outline-primary btn-sm mt-2">VIEW PROFILE</a>
                        <a th:href="@{/profile/edit}" class="btn btn-outline-secondary btn-sm mt-2">EDIT PROFILE</a>
                    </div>
                </div>
                <div class="card" style="box-shadow:6px 6px 0px var(--border);">
                    <div class="card-body">
                        <h6 style="font-family:var(--font-heading);text-transform:uppercase;font-size:0.8rem;border-bottom:3px solid var(--border);padding-bottom:8px;">QUICK STATS</h6>
                        <p style="font-family:var(--font);font-size:0.8rem;"><strong>CONNECTIONS:</strong> <span th:text="${connectionsCount}">0</span></p>
                        <p style="font-family:var(--font);font-size:0.8rem;"><strong>UNREAD NOTIFICATIONS:</strong> <span class="badge" style="background:var(--accent);border-color:var(--border);" th:text="${unreadNotifications}">0</span></p>
                    </div>
                </div>
            </div>
            <div class="col-md-8">
                <div class="card" style="box-shadow:6px 6px 0px var(--border);">
                    <div class="card-body">
                        <h5 style="font-family:var(--font-heading);text-transform:uppercase;font-size:1rem;border-bottom:3px solid var(--border);padding-bottom:8px;">WELCOME TO COFFEECONNECT</h5>
                        <p style="font-family:var(--font);font-size:0.85rem;">START BUILDING YOUR PROFESSIONAL NETWORK:</p>
                        <div class="row mt-3">
                            <div class="col-md-4 mb-3">
                                <a th:href="@{/discover}" class="text-decoration-none">
                                    <div class="card" style="background:var(--accent4);color:#fff;text-align:center;padding:16px;border:3px solid var(--border);box-shadow:4px 4px 0px var(--border);">
                                        <span style="font-size:2rem;">🔍</span>
                                        <h6 style="font-family:var(--font-heading);text-transform:uppercase;margin:8px 0 0;">DISCOVER</h6>
                                    </div>
                                </a>
                            </div>
                            <div class="col-md-4 mb-3">
                                <a th:href="@{/coffee-requests}" class="text-decoration-none">
                                    <div class="card" style="background:var(--accent3);color:#fff;text-align:center;padding:16px;border:3px solid var(--border);box-shadow:4px 4px 0px var(--border);">
                                        <span style="font-size:2rem;">☕</span>
                                        <h6 style="font-family:var(--font-heading);text-transform:uppercase;margin:8px 0 0;">REQUESTS</h6>
                                    </div>
                                </a>
                            </div>
                            <div class="col-md-4 mb-3">
                                <a th:href="@{/connections}" class="text-decoration-none">
                                    <div class="card" style="background:var(--accent2);color:var(--text);text-align:center;padding:16px;border:3px solid var(--border);box-shadow:4px 4px 0px var(--border);">
                                        <span style="font-size:2rem;">🤝</span>
                                        <h6 style="font-family:var(--font-heading);text-transform:uppercase;margin:8px 0 0;">NETWORK</h6>
                                    </div>
                                </a>
                            </div>
                            <div class="col-md-4 mb-3">
                                <a th:href="@{/messages}" class="text-decoration-none">
                                    <div class="card" style="background:var(--accent);color:#fff;text-align:center;padding:16px;border:3px solid var(--border);box-shadow:4px 4px 0px var(--border);">
                                        <span style="font-size:2rem;">💬</span>
                                        <h6 style="font-family:var(--font-heading);text-transform:uppercase;margin:8px 0 0;">MESSAGES</h6>
                                    </div>
                                </a>
                            </div>
                            <div class="col-md-4 mb-3">
                                <a th:href="@{/notifications}" class="text-decoration-none">
                                    <div class="card" style="background:var(--primary);color:#fff;text-align:center;padding:16px;border:3px solid var(--accent2);box-shadow:4px 4px 0px var(--border);">
                                        <span style="font-size:2rem;">🔔</span>
                                        <h6 style="font-family:var(--font-heading);text-transform:uppercase;margin:8px 0 0;">NOTIFS</h6>
                                    </div>
                                </a>
                            </div>
                            <div class="col-md-4 mb-3">
                                <a th:href="@{/profile}" class="text-decoration-none">
                                    <div class="card" style="background:#888;color:#fff;text-align:center;padding:16px;border:3px solid var(--border);box-shadow:4px 4px 0px var(--border);">
                                        <span style="font-size:2rem;">👤</span>
                                        <h6 style="font-family:var(--font-heading);text-transform:uppercase;margin:8px 0 0;">PROFILE</h6>
                                    </div>
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
