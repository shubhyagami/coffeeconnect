<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>User Management - CoffeeConnect Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>
    <div th:replace="~{fragments/admin-sidebar :: sidebar}"></div>
    <div class="admin-content">
        <div class="container-fluid p-4">
            <h4 class="mb-4">👥 User Management</h4>
            <div class="card shadow-sm mb-4">
                <div class="card-body">
                    <form th:action="@{/admin/users}" method="get" class="row g-2">
                        <div class="col-md-3"><input type="text" name="search" class="form-control" placeholder="Search..." th:value="${search}"></div>
                        <div class="col-md-2">
                            <select name="company" class="form-select">
                                <option value="">All Companies</option>
                                <option th:each="c : ${companies}" th:value="${c}" th:text="${c}" th:selected="${c == selectedCompany}"></option>
                            </select>
                        </div>
                        <div class="col-md-2">
                            <select name="department" class="form-select">
                                <option value="">All Depts</option>
                                <option th:each="d : ${departments}" th:value="${d}" th:text="${d}" th:selected="${d == selectedDept}"></option>
                            </select>
                        </div>
                        <div class="col-md-2">
                            <select name="status" class="form-select">
                                <option value="">All Status</option>
                                <option value="PENDING" th:selected="${selectedStatus == 'PENDING'}">PENDING</option>
                                <option value="VERIFIED" th:selected="${selectedStatus == 'VERIFIED'}">VERIFIED</option>
                                <option value="REJECTED" th:selected="${selectedStatus == 'REJECTED'}">REJECTED</option>
                            </select>
                        </div>
                        <div class="col-md-1"><button type="submit" class="btn btn-primary w-100">Filter</button></div>
                    </form>
                </div>
            </div>
            <div class="card shadow-sm">
                <div class="card-body p-0">
                    <table class="table table-hover mb-0">
                        <thead class="table-dark">
                            <tr>
                                <th>Name</th>
                                <th>Email</th>
                                <th>Company</th>
                                <th>Department</th>
                                <th>Status</th>
                                <th>Active</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="u : ${users}">
                                <td><a th:href="@{/admin/users/{id}(id=${u.id})}" th:text="${u.fullName}" class="text-decoration-none"></a></td>
                                <td th:text="${u.email}"></td>
                                <td th:text="${u.companyName}"></td>
                                <td th:text="${u.department}"></td>
                                <td><span class="badge" th:classappend="${u.verificationStatus.name() == 'VERIFIED' ? 'bg-success' : u.verificationStatus.name() == 'PENDING' ? 'bg-warning' : 'bg-danger'}" th:text="${u.verificationStatus.name()}"></span></td>
                                <td><span class="badge" th:classappend="${u.active} ? 'bg-success' : 'bg-danger'" th:text="${u.active} ? 'Active' : 'Suspended'"></span></td>
                                <td>
                                    <a th:href="@{/admin/users/{id}(id=${u.id})}" class="btn btn-sm btn-outline-primary">View</a>
                                    <form th:if="${u.active}" th:action="@{/admin/users/{id}/suspend(id=${u.id})}" method="post" style="display:inline">
                                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                        <button class="btn btn-sm btn-outline-warning" onclick="return confirm('Suspend this user?')">Suspend</button>
                                    </form>
                                    <form th:if="${!u.active}" th:action="@{/admin/users/{id}/activate(id=${u.id})}" method="post" style="display:inline">
                                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                        <button class="btn btn-sm btn-outline-success">Activate</button>
                                    </form>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
            <nav th:if="${totalPages > 1}" class="mt-3">
                <ul class="pagination justify-content-center">
                    <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'"><a class="page-link" th:href="@{/admin/users(page=${currentPage - 1})}">Previous</a></li>
                    <li th:each="i : ${#numbers.sequence(0, totalPages - 1)}" class="page-item" th:classappend="${i == currentPage} ? 'active'"><a class="page-link" th:href="@{/admin/users(page=${i})}" th:text="${i + 1}"></a></li>
                    <li class="page-item" th:classappend="${currentPage >= totalPages - 1} ? 'disabled'"><a class="page-link" th:href="@{/admin/users(page=${currentPage + 1})}">Next</a></li>
                </ul>
            </nav>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
