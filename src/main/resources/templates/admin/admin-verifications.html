<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Verifications - CoffeeConnect Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>
    <div th:replace="~{fragments/admin-sidebar :: sidebar}"></div>
    <div class="admin-content">
        <div class="container-fluid p-4">
            <h4 class="mb-4">✅ Employee Verification Center</h4>
            <div class="card shadow-sm">
                <div class="card-header bg-warning"><h6 class="mb-0">Pending Verifications</h6></div>
                <div class="card-body p-0">
                    <div th:if="${pendingUsers.isEmpty()}" class="text-center text-muted py-4">No pending verifications</div>
                    <table th:if="${!pendingUsers.isEmpty()}" class="table table-hover mb-0">
                        <thead class="table-dark">
                            <tr>
                                <th>Name</th>
                                <th>Email</th>
                                <th>Company</th>
                                <th>Employee ID</th>
                                <th>Department</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="u : ${pendingUsers}">
                                <td th:text="${u.fullName}"></td>
                                <td th:text="${u.email}"></td>
                                <td th:text="${u.companyName}"></td>
                                <td th:text="${u.employeeId}"></td>
                                <td th:text="${u.department}"></td>
                                <td>
                                    <button class="btn btn-success btn-sm me-1" data-bs-toggle="modal" th:attr="data-bs-target='#approveModal' + ${u.id}">Approve</button>
                                    <button class="btn btn-danger btn-sm" data-bs-toggle="modal" th:attr="data-bs-target='#rejectModal' + ${u.id}">Reject</button>
                                    <div class="modal fade" th:attr="id='approveModal' + ${u.id}" tabindex="-1">
                                        <div class="modal-dialog"><div class="modal-content">
                                            <form th:action="@{/admin/verifications/{id}/approve(id=${u.id})}" method="post">
                                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                                <div class="modal-header"><h5>Approve <span th:text="${u.fullName}"></span></h5></div>
                                                <div class="modal-body">
                                                    <label>Admin Notes</label>
                                                    <textarea name="adminNotes" class="form-control" rows="2"></textarea>
                                                </div>
                                                <div class="modal-footer">
                                                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                                                    <button type="submit" class="btn btn-success">Approve</button>
                                                </div>
                                            </form>
                                        </div></div>
                                    </div>
                                    <div class="modal fade" th:attr="id='rejectModal' + ${u.id}" tabindex="-1">
                                        <div class="modal-dialog"><div class="modal-content">
                                            <form th:action="@{/admin/verifications/{id}/reject(id=${u.id})}" method="post">
                                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                                <div class="modal-header"><h5>Reject <span th:text="${u.fullName}"></span></h5></div>
                                                <div class="modal-body">
                                                    <label>Reason for Rejection</label>
                                                    <textarea name="adminNotes" class="form-control" rows="2" required></textarea>
                                                </div>
                                                <div class="modal-footer">
                                                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                                                    <button type="submit" class="btn btn-danger">Reject</button>
                                                </div>
                                            </form>
                                        </div></div>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
