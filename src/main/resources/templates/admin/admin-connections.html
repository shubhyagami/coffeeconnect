<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Connections - CoffeeConnect Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>
    <div th:replace="~{fragments/admin-sidebar :: sidebar}"></div>
    <div class="admin-content">
        <div class="container-fluid p-4">
            <h4 class="mb-4">🔗 Connection Management</h4>
            <div class="card shadow-sm">
                <div class="card-body p-0">
                    <table class="table table-hover mb-0">
                        <thead class="table-dark">
                            <tr><th>User 1</th><th>User 2</th><th>Connected At</th><th>Actions</th></tr>
                        </thead>
                        <tbody>
                            <tr th:each="c : ${connections}">
                                <td th:text="${c.userOne.fullName}"></td>
                                <td th:text="${c.userTwo.fullName}"></td>
                                <td th:text="${c.connectedAt}"></td>
                                <td>
                                    <form th:action="@{/admin/connections/{id}/remove(id=${c.id})}" method="post" onsubmit="return confirm('Remove this connection?')">
                                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                        <button class="btn btn-sm btn-outline-danger">Remove</button>
                                    </form>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
