<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Messages - CoffeeConnect</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div th:replace="~{fragments/navbar :: navbar}"></div>
    <div class="container-fluid mt-4 px-4">
        <div class="row g-4">
            <!-- Conversations List -->
            <div class="col-md-4">
                <div class="card" style="box-shadow:6px 6px 0px var(--border);">
                    <div class="card-header" style="background:var(--primary);color:#fff;font-family:var(--font-heading);">💬 CONVERSATIONS</div>
                    <div class="card-body p-0" style="max-height:500px;overflow-y:auto;">
                        <div th:if="${conversations.isEmpty()}" class="text-center py-5" style="font-family:var(--font);">
                            <p>NO CONVERSATIONS YET</p>
                            <a th:href="@{/connections}" class="btn btn-primary btn-sm">FIND CONNECTIONS</a>
                        </div>
                        <div th:each="conv : ${conversations}" class="p-3 border-bottom" style="border-color:var(--border)!important;border-width:2px!important;" th:classappend="${conv.id == activeConversation} ? 'bg-warning' : ''">
                            <a th:href="@{/messages(conversation=${conv.id})}" class="text-decoration-none text-dark">
                                <div class="d-flex align-items-center">
                                    <img th:src="${conv.otherUserProfilePic} ?: 'https://ui-avatars.com/api/?name=' + ${conv.otherUserName} + '&background=random&font-size=0.33'"
                                         style="width:45px;height:45px;border:3px solid var(--border);margin-right:12px;">
                                    <div class="flex-grow-1">
                                        <strong style="font-family:var(--font-heading);text-transform:uppercase;font-size:0.8rem;" th:text="${conv.otherUserName}"></strong>
                                        <span th:if="${conv.unread}" class="badge" style="background:var(--accent);color:#fff;border:2px solid var(--border);margin-left:4px;">NEW</span>
                                        <small class="d-block" style="font-family:var(--font);color:var(--text-muted);font-size:0.7rem;" th:text="${conv.otherUserDepartment}"></small>
                                        <small class="d-block text-truncate" style="font-family:var(--font);color:var(--text-muted);font-size:0.7rem;" th:text="${conv.lastMessage}"></small>
                                    </div>
                                    <small style="font-family:var(--font);color:var(--text-muted);font-size:0.6rem;" th:text="${conv.lastMessageAt}"></small>
                                </div>
                            </a>
                        </div>
                    </div>
                </div>
            </div>
            <!-- Chat Area -->
            <div class="col-md-8">
                <div th:if="${activeConversation == null}" class="card" style="box-shadow:6px 6px 0px var(--border);">
                    <div class="card-body text-center py-5">
                        <h5 style="font-family:var(--font-heading);text-transform:uppercase;">SELECT A CONVERSATION</h5>
                        <p style="font-family:var(--font);color:var(--text-muted);">SEND IMAGES, VOICE RECORDINGS, OR VIDEO CALL YOUR CONNECTIONS</p>
                    </div>
                </div>
                <div th:if="${activeConversation != null}" class="card" style="box-shadow:6px 6px 0px var(--border);">
                    <div class="card-header d-flex align-items-center" th:if="${otherUser}" style="background:var(--primary);color:#fff;">
                        <img th:src="${otherUser.profilePictureBase64} ?: (${otherUser.profilePictureUrl} ?: 'https://ui-avatars.com/api/?name=' + ${otherUser.firstName} + '+' + ${otherUser.lastName} + '&background=random&font-size=0.33')"
                             style="width:40px;height:40px;border:2px solid var(--accent2);margin-right:12px;">
                        <strong style="font-family:var(--font-heading);text-transform:uppercase;font-size:0.85rem;" th:text="${otherUser.fullName}"></strong>
                        <div class="ms-auto">
                            <form th:action="@{/video-call/start}" method="post" style="display:inline">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                <input type="hidden" name="userId" th:value="${otherUser.id}">
                                <button type="submit" class="btn btn-success btn-sm">📹 VIDEO CALL</button>
                            </form>
                        </div>
                    </div>
                    <div class="card-body" style="height:420px;overflow-y:auto;background:#e8e4de;border:3px inset var(--border);">
                        <div th:each="msg : ${messages}" class="mb-3" th:classappend="${msg.senderId == currentUserId} ? 'text-end' : 'text-start'">
                            <div class="d-inline-block p-3" style="border:3px solid var(--border);max-width:75%;word-wrap:break-word;" th:classappend="${msg.senderId == currentUserId} ? '' : ''"
                                 th:style="${msg.senderId == currentUserId} ? 'background:var(--accent4);color:#fff;' : 'background:#fff;color:var(--text);'">
                                <p class="mb-1" th:if="${msg.content}" th:text="${msg.content}" style="font-family:var(--font);font-size:0.85rem;"></p>
                                <div th:if="${msg.messageType == 'IMAGE' && msg.attachmentUrl}">
                                    <img th:src="${msg.attachmentUrl}" class="img-fluid" style="max-width:250px;border:2px solid var(--border);cursor:pointer;" onclick="window.open(this.src)">
                                </div>
                                <div th:if="${msg.messageType == 'AUDIO' && msg.attachmentUrl}">
                                    <audio controls class="w-100" style="max-width:250px;"><source th:src="${msg.attachmentUrl}" th:type="${msg.mimeType}"></audio>
                                </div>
                                <div th:if="${msg.messageType == 'VOICE' && msg.attachmentUrl}">
                                    <audio controls class="w-100" style="max-width:250px;"><source th:src="${msg.attachmentUrl}" th:type="${msg.mimeType}"></audio>
                                </div>
                                <div th:if="${msg.messageType == 'VIDEO' && msg.attachmentUrl}">
                                    <video controls class="w-100" style="max-width:300px;border:2px solid var(--border);"><source th:src="${msg.attachmentUrl}" th:type="${msg.mimeType}"></video>
                                </div>
                                <div th:if="${msg.messageType == 'FILE' && msg.attachmentUrl}">
                                    <a th:href="${msg.attachmentUrl}" target="_blank" class="btn btn-sm" style="background:var(--accent2);border:2px solid var(--border);box-shadow:none;">📎 <span th:text="${msg.attachmentName}"></span></a>
                                </div>
                                <small style="font-family:var(--font);font-size:0.6rem;opacity:0.7;" th:text="${msg.sentAt}"></small>
                            </div>
                        </div>
                    </div>
                    <div class="card-footer" style="border-top:3px solid var(--border);background:#fff;">
                        <form th:action="@{/messages/send-media}" method="post" enctype="multipart/form-data" class="row g-2">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <input type="hidden" name="conversationId" th:value="${activeConversation}">
                            <div class="col-7">
                                <input type="text" name="content" class="form-control" placeholder="TYPE A MESSAGE...">
                            </div>
                            <div class="col-3">
                                <input type="file" name="file" class="form-control form-control-sm" accept="image/*,audio/*,video/*" style="font-size:0.7rem;">
                            </div>
                            <div class="col-2">
                                <button type="submit" class="btn btn-primary w-100" style="font-size:0.7rem;padding:8px;">SEND</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        if (window.location.href.includes('conversation=')) {
            setTimeout(function() {
                var chatBox = document.querySelector('.card-body[style*="overflow-y"]');
                if (chatBox) chatBox.scrollTop = chatBox.scrollHeight;
            }, 100);
        }
    </script>
</body>
</html>
