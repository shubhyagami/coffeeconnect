<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Send Notification - CoffeeConnect Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>
    <div th:replace="~{fragments/admin-sidebar :: sidebar}"></div>
    <div class="admin-content">
        <div class="container-fluid p-4">
            <h4 class="mb-4">📢 Send Notification</h4>
            <div class="card shadow-sm">
                <div class="card-body">
                    <form th:action="@{/admin/notifications/send}" th:object="${notificationDto}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <div class="mb-3">
                            <label class="form-label">Title *</label>
                            <input type="text" th:field="*{title}" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Message *</label>
                            <textarea th:field="*{message}" class="form-control" rows="3" required></textarea>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Scope *</label>
                            <select th:field="*{scope}" class="form-select" required>
                                <option value="GLOBAL">All Users (Global)</option>
                                <option value="COMPANY">Company</option>
                                <option value="CAMPUS">Campus</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Target ID (Company/Campus name)</label>
                            <input type="text" th:field="*{targetId}" class="form-control" placeholder="e.g., TCS, Mumbai Campus">
                        </div>
                        <button type="submit" class="btn btn-primary">Send Notification</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
