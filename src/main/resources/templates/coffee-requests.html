<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Coffee Requests - CoffeeConnect</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div th:replace="~{fragments/navbar :: navbar}"></div>
    <div class="container mt-4">
        <h4 style="font-family:var(--font-heading);text-transform:uppercase;border-bottom:4px solid var(--border);padding-bottom:8px;margin-bottom:20px;">☕ COFFEE REQUESTS</h4>
        <div class="row">
            <div class="col-md-6">
                <div class="card" style="box-shadow:6px 6px 0px var(--border);">
                    <div class="card-header" style="background:var(--accent);">📥 RECEIVED</div>
                    <div class="card-body p-0">
                        <div th:if="${receivedRequests.isEmpty()}" class="text-center py-4" style="font-family:var(--font);color:var(--text-muted);">NO RECEIVED REQUESTS</div>
                        <div th:each="req : ${receivedRequests}" class="p-3 border-bottom" style="border-color:var(--border)!important;">
                            <div class="d-flex align-items-center mb-2">
                                <img th:src="${req.senderProfilePic} ?: 'https://ui-avatars.com/api/?name=' + ${req.senderName} + '&background=random&font-size=0.33'"
                                     style="width:40px;height:40px;border:2px solid var(--border);margin-right:10px;">
                                <div>
                                    <strong style="font-family:var(--font-heading);text-transform:uppercase;font-size:0.8rem;" th:text="${req.senderName}"></strong>
                                    <small class="d-block" style="font-family:var(--font);color:var(--text-muted);font-size:0.7rem;" th:text="${req.senderDepartment}"></small>
                                </div>
                                <span class="ms-auto badge" th:text="${req.status}"
                                      style="font-family:var(--font);font-size:0.65rem;"
                                      th:style="${req.status == 'PENDING' ? 'background:var(--accent2);border-color:var(--border);color:var(--text);' : req.status == 'ACCEPTED' ? 'background:var(--accent3);border-color:var(--border);color:#fff;' : 'background:#888;border-color:var(--border);color:#fff;'}"></span>
                            </div>
                            <p th:if="${req.message}" class="small mb-1" style="font-family:var(--font);" th:text="${req.message}"></p>
                            <small style="font-family:var(--font);color:var(--text-muted);font-size:0.65rem;" th:text="${req.createdAt}"></small>
                            <div th:if="${req.status == 'PENDING'}" class="mt-2">
                                <form th:action="@{/coffee-requests/{id}/accept(id=${req.id})}" method="post" style="display:inline">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                    <button class="btn btn-success btn-sm">ACCEPT</button>
                                </form>
                                <form th:action="@{/coffee-requests/{id}/decline(id=${req.id})}" method="post" style="display:inline">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                    <button class="btn btn-danger btn-sm">DECLINE</button>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card" style="box-shadow:6px 6px 0px var(--border);">
                    <div class="card-header" style="background:var(--primary);">📤 SENT</div>
                    <div class="card-body p-0">
                        <div th:if="${sentRequests.isEmpty()}" class="text-center py-4" style="font-family:var(--font);color:var(--text-muted);">NO SENT REQUESTS</div>
                        <div th:each="req : ${sentRequests}" class="p-3 border-bottom" style="border-color:var(--border)!important;">
                            <div class="d-flex align-items-center mb-2">
                                <img th:src="${req.receiverProfilePic} ?: 'https://ui-avatars.com/api/?name=' + ${req.receiverName} + '&background=random&font-size=0.33'"
                                     style="width:40px;height:40px;border:2px solid var(--border);margin-right:10px;">
                                <div>
                                    <strong style="font-family:var(--font-heading);text-transform:uppercase;font-size:0.8rem;" th:text="${req.receiverName}"></strong>
                                    <small class="d-block" style="font-family:var(--font);color:var(--text-muted);font-size:0.7rem;" th:text="${req.receiverDepartment}"></small>
                                </div>
                                <span class="ms-auto badge" th:text="${req.status}" th:style="${req.status == 'PENDING' ? 'background:var(--accent2);border-color:var(--border);color:var(--text);' : req.status == 'ACCEPTED' ? 'background:var(--accent3);border-color:var(--border);color:#fff;' : 'background:#888;border-color:var(--border);color:#fff;'}"
                                      style="font-family:var(--font);font-size:0.65rem;"></span>
                            </div>
                            <p th:if="${req.message}" class="small mb-1" style="font-family:var(--font);" th:text="${req.message}"></p>
                            <small style="font-family:var(--font);color:var(--text-muted);font-size:0.65rem;" th:text="${req.createdAt}"></small>
                            <div th:if="${req.status == 'PENDING'}" class="mt-2">
                                <form th:action="@{/coffee-requests/{id}/cancel(id=${req.id})}" method="post" style="display:inline">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                    <button class="btn btn-outline-danger btn-sm">CANCEL</button>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
