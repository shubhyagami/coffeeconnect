<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Edit Profile - CoffeeConnect</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div th:replace="~{fragments/navbar :: navbar}"></div>
    <div class="container mt-4">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card" style="box-shadow:8px 8px 0px var(--border);border:4px solid var(--border);">
                    <div class="card-body p-4">
                        <h4 style="font-family:var(--font-heading);text-transform:uppercase;border-bottom:3px solid var(--border);padding-bottom:8px;">✏️ EDIT PROFILE</h4>
                        <form th:action="@{/profile/edit}" th:object="${profileDto}" method="post" enctype="multipart/form-data">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <div class="row mt-3">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">FIRST NAME</label>
                                    <input type="text" th:field="*{firstName}" class="form-control" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">LAST NAME</label>
                                    <input type="text" th:field="*{lastName}" class="form-control" required>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">GENDER</label>
                                    <select th:field="*{gender}" class="form-select">
                                        <option value="Male">MALE</option>
                                        <option value="Female">FEMALE</option>
                                        <option value="Other">OTHER</option>
                                    </select>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">DEPARTMENT</label>
                                    <input type="text" th:field="*{department}" class="form-control">
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">DESIGNATION</label>
                                    <input type="text" th:field="*{designation}" class="form-control">
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">CITY</label>
                                    <input type="text" th:field="*{city}" class="form-control">
                                </div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">OFFICE CAMPUS</label>
                                <input type="text" th:field="*{officeCampus}" class="form-control">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">PROFILE PICTURE</label>
                                <input type="file" name="profileImage" class="form-control" accept="image/*">
                                <input type="hidden" th:field="*{profilePictureUrl}">
                                <small style="font-family:var(--font);font-size:0.7rem;color:var(--text-muted);">LEAVE EMPTY TO KEEP CURRENT IMAGE</small>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">BIO</label>
                                <textarea th:field="*{bio}" class="form-control" rows="3"></textarea>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">INTERESTS</label>
                                <input type="text" th:field="*{interests}" class="form-control">
                            </div>
                            <button type="submit" class="btn btn-primary" style="font-size:0.8rem;">SAVE CHANGES</button>
                            <a th:href="@{/profile}" class="btn btn-outline-secondary" style="font-size:0.8rem;">CANCEL</a>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
