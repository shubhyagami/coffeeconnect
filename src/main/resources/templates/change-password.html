<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Change Password - CoffeeConnect</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div th:replace="~{fragments/navbar :: navbar}"></div>
    <div class="container mt-4">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card" style="box-shadow:8px 8px 0px var(--border);border:4px solid var(--border);">
                    <div class="card-body p-4">
                        <h4 style="font-family:var(--font-heading);text-transform:uppercase;border-bottom:3px solid var(--border);padding-bottom:8px;">🔑 CHANGE PASSWORD</h4>
                        <div th:if="${error}" class="alert alert-danger mt-3" th:text="${error}"></div>
                        <form th:action="@{/profile/change-password}" th:object="${passwordDto}" method="post" class="mt-3">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <div class="mb-3">
                                <label class="form-label">CURRENT PASSWORD</label>
                                <input type="password" th:field="*{currentPassword}" class="form-control" required>
                                <div th:if="${#fields.hasErrors('currentPassword')}" class="text-danger" style="font-family:var(--font);font-size:0.75rem;" th:errors="*{currentPassword}"></div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">NEW PASSWORD</label>
                                <input type="password" th:field="*{newPassword}" class="form-control" required>
                                <small style="font-family:var(--font);font-size:0.65rem;color:var(--text-muted);">MIN 8 CHARS, UPPER, LOWER, NUMBER, SPECIAL</small>
                                <div th:if="${#fields.hasErrors('newPassword')}" class="text-danger" style="font-family:var(--font);font-size:0.75rem;" th:errors="*{newPassword}"></div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">CONFIRM NEW PASSWORD</label>
                                <input type="password" th:field="*{confirmPassword}" class="form-control" required>
                                <div th:if="${#fields.hasErrors('confirmPassword')}" class="text-danger" style="font-family:var(--font);font-size:0.75rem;" th:errors="*{confirmPassword}"></div>
                            </div>
                            <button type="submit" class="btn btn-primary w-100" style="font-size:0.8rem;padding:10px;">CHANGE PASSWORD</button>
                            <a th:href="@{/profile}" class="btn btn-outline-secondary w-100 mt-2" style="font-size:0.8rem;padding:10px;">CANCEL</a>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
