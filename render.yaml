services:
  - type: web
    name: coffeeconnect
    runtime: java
    buildCommand: mvn clean package -DskipTests
    startCommand: java -Dserver.port=$PORT $JAVA_OPTS -jar target/coffeeconnect-1.0.0.jar
    healthCheckPath: /
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: render
      - key: JAVA_OPTS
        value: -Xmx256m -XX:+UseG1GC
      - key: RENDER_DATABASE_URL
        fromDatabase:
          name: coffeeconnect-db
          property: connectionString
databases:
  - name: coffeeconnect-db
    plan: free
    databaseName: coffeeconnect
    user: coffeeconnect
